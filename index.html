<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我们的恋爱小窝 💕</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'PingFang SC','Microsoft YaHei',sans-serif;background:#FFF5F0;color:#4A3040;height:100vh;overflow:hidden}
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:#fff;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:50px}
.topbar .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:15px}
.topbar .dot{width:8px;height:8px;border-radius:50%;margin-right:2px}
.topbar .dot.g{background:#4CAF50}.topbar .dot.r{background:#ccc}.topbar .dot.y{background:#FF9800}
.topbar .tabs{display:flex;gap:0}
.topbar .tabs button{padding:7px 12px;border:none;background:none;border-radius:16px;font-size:12px;font-family:inherit;color:#888;cursor:pointer;transition:all 0.15s}
.topbar .tabs button:hover{color:#E8879B;background:rgba(244,172,183,0.06)}
.topbar .tabs button.on{color:#fff;background:linear-gradient(135deg,#F4ACB7,#E8879B);font-weight:600}
.topbar .tabs button em{font-style:normal}@media(max-width:768px){.topbar .tabs button em{display:none}.topbar .tabs button{padding:7px 8px;font-size:16px}}
.main{display:flex;height:100vh;padding-top:50px}
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden}
.page.show{display:flex}
.page-inner{flex:1;padding:16px 20px}
.page-inner::-webkit-scrollbar{width:4px}
.page-inner::-webkit-scrollbar-thumb{background:#FFCAD4;border-radius:10px}

/* MAP */
.mwrap{flex:1;position:relative}
#map{position:absolute;top:0;left:0;right:0;bottom:0}
.search{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:600;width:380px;max-width:88%}
.search .box{display:flex;background:#fff;border-radius:22px;box-shadow:0 3px 12px rgba(0,0,0,0.08);overflow:hidden}
.search .box input{flex:1;border:none;outline:none;padding:10px 14px;font-size:12px;font-family:inherit;background:transparent;color:#4A3040}
.search .box input::placeholder{color:#bbb}
.search .box button{width:40px;border:none;background:none;color:#E8879B;cursor:pointer;font-size:16px;flex-shrink:0}
.results{position:absolute;top:46px;left:0;right:0;background:#fff;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,0.1);max-height:180px;overflow-y:auto;display:none}
.results.open{display:block}
.results .r{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:1px solid #f5f5f5;font-size:12px}
.results .r:hover{background:#FFF5F0}
.tools{position:absolute;bottom:80px;right:10px;z-index:550;display:flex;flex-direction:column;gap:5px}
.tools button{width:36px;height:36px;border-radius:50%;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.08);cursor:pointer;font-size:15px;color:#666;transition:transform 0.12s}
.tools button:hover{transform:scale(1.06)}
.tools button.ac{background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff}.bigadd{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:550;width:52px;height:52px;border-radius:50%;border:none;background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;font-size:24px;cursor:pointer;box-shadow:0 4px 18px rgba(232,135,155,0.35);transition:transform 0.15s;display:flex;align-items:center;justify-content:center}.bigadd:hover{transform:translateX(-50%) scale(1.1)}
.big-add-btn{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);z-index:590;padding:12px 28px;border-radius:24px;border:none;background:linear-gradient(135deg,#E8879B,#D4687C);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(232,135,155,0.4);letter-spacing:1px;animation:pulse 2s ease-in-out infinite}.big-add-btn:hover{transform:translateX(-50%) scale(1.06)}
.hint{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(255,255,255,0.95);border-radius:20px;padding:10px 20px;font-size:12px;color:#D4788A;z-index:500;pointer-events:auto;cursor:pointer;box-shadow:0 2px 16px rgba(232,135,155,0.15);border:2px solid rgba(244,172,183,0.3);transition:all 0.15s;user-select:none}.hint:hover{background:#fff;border-color:#F4ACB7;transform:translateX(-50%) translateY(-2px);box-shadow:0 4px 20px rgba(232,135,155,0.25)}
.pin{position:absolute;z-index:550;width:30px;height:30px;background:linear-gradient(135deg,#F4ACB7,#E8879B);border-radius:50% 50% 50% 0;transform:translate(-50%,-100%) rotate(-45deg);box-shadow:0 3px 8px rgba(232,135,155,0.4);border:2px solid #fff;pointer-events:none;display:none}
.plabel{position:absolute;z-index:560;background:#fff;border-radius:14px;padding:5px 10px;font-size:11px;font-weight:600;box-shadow:0 3px 12px rgba(0,0,0,0.1);display:none;white-space:nowrap;pointer-events:none;transform:translate(-50%,-110%);color:#4A3040}
.plabel span{display:block;font-size:9px;color:#999;font-weight:400}

/* MAP SIDEBAR */
.side{width:300px;background:#fff;border-left:1px solid #eee;display:flex;flex-direction:column;overflow:hidden}
.sidehead{padding:14px 16px 8px;display:flex;justify-content:space-between;font-weight:600;font-size:13px;border-bottom:1px solid #f5f5f5}
.sidehead .t2{display:flex;gap:4px}
.sidehead .t2 button{padding:3px 10px;border-radius:10px;border:1px solid #e0e0e0;background:none;font-size:10px;font-family:inherit;cursor:pointer;color:#999}
.sidehead .t2 button.on{background:#F4ACB7;color:#fff;border-color:#F4ACB7}
.sidelist{flex:1;overflow-y:auto;padding:8px 12px}
.sidelist::-webkit-scrollbar{width:3px}
.sidelist::-webkit-scrollbar-thumb{background:#FFCAD4;border-radius:10px}
.scard{position:relative;padding:10px 12px 10px 30px;margin-bottom:6px;background:#fff;border:1px solid #f0f0f0;border-radius:10px;cursor:pointer;transition:box-shadow 0.15s;font-size:11px}
.scard:hover{box-shadow:0 4px 12px rgba(244,172,183,0.12)}
.scard::before{content:'';position:absolute;left:10px;top:14px;width:8px;height:8px;background:#F4ACB7;border-radius:50%}
.scard .sn{font-weight:600;font-size:12px}.scard .sa{font-size:9px;color:#bbb;margin-top:1px}.scard .sd{font-size:9px;color:#ccc}
.empty{text-align:center;padding:30px;color:#ccc;font-size:12px}
.empty .ei{font-size:32px;margin-bottom:6px}

/* OTHER PAGES */
.hd{text-align:center;padding:20px 16px 10px}
.hd h2{font-size:18px;font-weight:700}
.hd p{font-size:11px;color:#999;margin-top:2px}

/* Things */
.thingsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:8px;padding:8px 0 20px}
.tcard{display:flex;align-items:center;gap:10px;padding:10px 14px;background:#fff;border:1px solid #f0f0f0;border-radius:10px;cursor:pointer;font-size:12px;transition:border-color 0.12s}
.tcard:hover{border-color:#F4ACB7}.tcard.done{opacity:0.4;text-decoration:line-through;text-decoration-color:#F4ACB7}
.tcard .chk{width:24px;height:24px;border-radius:50%;border:2px solid #eee;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;color:#fff}
.tcard.done .chk{background:#F4ACB7;border-color:#F4ACB7}
.tcard .tcard-del{width:22px;height:22px;border:none;background:none;color:#ccc;cursor:pointer;border-radius:50%;font-size:10px;flex-shrink:0;opacity:0;transition:opacity 0.12s}
.tcard:hover .tcard-del{opacity:1}.tcard .tcard-del:hover{color:#D4687C;background:#fff0f0}
.barwrap{display:flex;align-items:center;justify-content:center;gap:10px;margin:8px 0 16px}
.barwrap .bar{width:200px;height:6px;background:#f5f5f5;border-radius:6px;overflow:hidden}
.barwrap .bar .fill{height:100%;background:linear-gradient(90deg,#F4ACB7,#E8879B);border-radius:6px;transition:width 0.3s}
.barwrap .pct{font-size:18px;font-weight:700;color:#E8879B}

/* Anniversaries */
.annigrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;padding:10px 0 20px}
.acard{background:#fff;border:1px solid #f0f0f0;border-radius:14px;padding:20px 14px;text-align:center;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;position:relative}
.acard:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(244,172,183,0.14)}
.acard .ai{font-size:32px;margin-bottom:6px}.acard .an{font-size:14px;font-weight:600}.acard .ad{font-size:10px;color:#ccc;margin:3px 0 6px}
.acard .ac{display:inline-block;padding:4px 12px;background:#FFF5F0;border-radius:14px;font-size:11px;font-weight:700;color:#E8879B}
.acard .arm{position:absolute;top:6px;right:10px;width:20px;height:20px;border:none;background:none;color:#ccc;cursor:pointer;border-radius:50%;font-size:10px;opacity:0;transition:opacity 0.12s}
.acard:hover .arm{opacity:1}.acard .arm:hover{color:#D4687C;background:#fff0f0}
.aadd{display:flex;align-items:center;justify-content:center;min-height:140px;border:2px dashed #eee;border-radius:14px;cursor:pointer;color:#F4ACB7;font-size:13px;transition:border-color 0.12s}
.aadd:hover{border-color:#F4ACB7;background:rgba(244,172,183,0.02)}

/* Stats */
.statsgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;padding:10px 0 16px}
.statsc{background:#fff;border:1px solid #f0f0f0;border-radius:12px;padding:18px 12px;text-align:center;transition:transform 0.12s}
.statsc:hover{transform:translateY(-2px)}.statsc .si{font-size:26px;margin-bottom:4px}
.statsc .sn{font-size:22px;font-weight:700;color:#E8879B}.statsc .sl{font-size:10px;color:#ccc;margin-top:2px}
.banner{background:linear-gradient(135deg,#FFF5F7,#FFE5D9);border-radius:16px;padding:24px;text-align:center;margin-bottom:14px;position:relative;overflow:hidden}
.banner .bg{position:absolute;top:-20px;right:-10px;font-size:60px;opacity:0.04}.banner .bn{font-size:44px;font-weight:800;background:linear-gradient(135deg,#E8879B,#C87080);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.banner .cols{display:flex;justify-content:center;gap:20px;margin-top:12px;font-size:11px;color:#999}
.banner .cols div{text-align:center}.banner .cols b{display:block;font-size:18px;color:#E8879B}
.tags{display:flex;flex-wrap:wrap;gap:6px;padding:10px 0}
.tags span{padding:5px 12px;background:#FFF5F0;border-radius:14px;font-size:11px;color:#E8879B;cursor:pointer;transition:transform 0.12s}
.tags span:hover{transform:scale(1.05)}

/* Letters */
.lcard{background:#fff;border:1px solid #f0f0f0;border-radius:12px;padding:16px 18px;margin-bottom:10px;position:relative;transition:box-shadow 0.15s}
.lcard:hover{box-shadow:0 4px 14px rgba(244,172,183,0.1)}
.lcard .lrm{position:absolute;top:8px;right:12px;width:22px;height:22px;border:none;background:none;color:#ccc;cursor:pointer;border-radius:50%;font-size:10px;opacity:0.2;transition:opacity 0.12s}
.lcard:hover .lrm{opacity:1}.lcard .lrm:hover{color:#D4687C}
.lcard h4{font-size:13px;margin-bottom:4px}.lcard p{font-size:11px;color:#999;line-height:1.6;white-space:pre-wrap}.lcard .ld{font-size:9px;color:#ddd;margin-top:8px}

/* Modal */
.ovl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.2);z-index:2500;display:flex;align-items:center;justify-content:center}
.mdl{background:#fff;border-radius:16px;padding:24px;width:340px;text-align:center;box-shadow:0 12px 40px rgba(0,0,0,0.12)}
.mdl h4{font-size:14px;margin-bottom:12px}
.mdl input{width:100%;padding:9px 12px;border:2px solid #eee;border-radius:10px;font-size:12px;font-family:inherit;outline:none;text-align:center;margin-bottom:7px;color:#4A3040}
.mdl input:focus{border-color:#F4ACB7}
.mdl .mr{display:flex;gap:8px;margin-top:12px}
.mdl .mr button{flex:1;padding:10px;border:none;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer}
.mdl .mr .ok{background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff}
.mdl .mr .no{background:none;color:#999}

/* Detail */
.dovl{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.2);z-index:2000;display:flex;align-items:center;justify-content:center}
.dpanel{background:#fff;border-radius:18px;width:500px;max-height:80vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.12);position:relative}
.dpanel::-webkit-scrollbar{width:4px}.dpanel::-webkit-scrollbar-thumb{background:#FFCAD4;border-radius:10px}
.dtop{position:sticky;top:0;z-index:5;display:flex;justify-content:flex-end;padding:8px 8px 0 0;background:linear-gradient(to bottom,#fff 60%,transparent)}
.dtop button{width:28px;height:28px;background:#f5f5f5;border:none;border-radius:50%;cursor:pointer;font-size:13px;color:#999}
.din{padding:0 22px 22px}.dhero{text-align:center;margin-bottom:16px}
.dhero .di{width:52px;height:52px;background:linear-gradient(135deg,#FFF0F3,#FFE0E7);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 8px}
.dhero input{text-align:center;font-size:18px;font-weight:700;border:none;background:none;font-family:inherit;color:#4A3040;width:100%;outline:none;padding:2px 0}
.dhero input:focus{border-bottom:2px solid #F4ACB7}.dhero .da{font-size:10px;color:#bbb;margin-top:2px}
.sec{margin-top:16px}.sec h4{font-size:12px;color:#E8879B;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec h4::before{content:'';width:3px;height:12px;background:linear-gradient(180deg,#F4ACB7,#E8879B);border-radius:2px}
.pgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pgrid .pc{aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;position:relative;background:#FFF5F0}
.pgrid .pc img{width:100%;height:100%;object-fit:cover;transition:transform 0.2s}
.pgrid .pc:hover img{transform:scale(1.04)}
.pgrid .pc .pr{position:absolute;top:3px;right:3px;width:18px;height:18px;background:rgba(0,0,0,0.35);color:#fff;border:none;border-radius:50%;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.12s}
.pgrid .pc:hover .pr{opacity:1}
.pgrid .add{aspect-ratio:1;border:2px dashed #FFCAD4;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:#F4ACB7;font-size:18px}
.pgrid .add:hover{border-color:#E8879B}.pgrid .add span{font-size:9px}
.ta{width:100%;min-height:60px;padding:8px 12px;border:2px solid #f0f0f0;border-radius:10px;font-size:11px;font-family:inherit;outline:none;resize:vertical;line-height:1.5;transition:border-color 0.12s}
.ta:focus{border-color:#F4ACB7}.ta::placeholder{color:#ddd}
.mems{display:flex;flex-direction:column;gap:4px}
.mems .mi{display:flex;align-items:flex-start;gap:6px;background:#FFF5F0;border-radius:8px;padding:7px 10px;font-size:11px;line-height:1.4}
.mems .mi .md{width:4px;height:4px;background:#F4ACB7;border-radius:50%;flex-shrink:0;margin-top:4px}
.mems .mi .mx{flex:1}.mems .mi .mr{width:18px;height:18px;border:none;background:none;color:#ccc;cursor:pointer;border-radius:50%;font-size:9px;flex-shrink:0;opacity:0.2}.mems .mi:hover .mr{opacity:1}
.mar{display:flex;gap:6px;margin-top:6px}
.mar input{flex:1;padding:7px 10px;border:2px solid #f0f0f0;border-radius:16px;font-size:11px;font-family:inherit;outline:none}.mar input:focus{border-color:#F4ACB7}
.mar button{width:30px;height:30px;background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;border:none;border-radius:50%;font-size:14px;cursor:pointer;flex-shrink:0}
.emos{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap}
.emos button{width:28px;height:28px;border-radius:50%;border:2px solid transparent;background:#fafafa;font-size:14px;cursor:pointer}.emos button:hover{border-color:#F4ACB7}.emos button.on{border-color:#E8879B;background:#fff}
.saverow{display:flex;gap:8px;margin-top:18px}
.evcard{background:#FFF5F7;border:1px solid rgba(244,172,183,0.2);border-radius:10px;padding:10px 14px;margin-bottom:6px;position:relative}
.evcard .evtop{display:flex;align-items:center;gap:6px}.evcard .evemoji{font-size:16px}.evcard .evtitle{font-weight:600;font-size:12px;flex:1}.evcard .evdate{font-size:9px;color:#bbb}
.evcard .evnote{font-size:10px;color:#999;margin-top:4px;line-height:1.4}
.evcard .evdel{position:absolute;top:6px;right:8px;width:18px;height:18px;border:none;background:none;color:#ccc;cursor:pointer;border-radius:50%;font-size:9px;opacity:0;transition:opacity 0.12s}
.evcard:hover .evdel{opacity:1}.evcard .evdel:hover{color:#D4687C}
.evadd{display:flex;gap:4px;align-items:center;margin-top:8px}.evadd input{flex:1;padding:5px 8px;border:1px solid #f0f0f0;border-radius:12px;font-size:10px;font-family:inherit;outline:none}.evadd input:focus{border-color:#F4ACB7}.evadd input.evd{max-width:100px;flex:none}
.evadd button{width:26px;height:26px;background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;border:none;border-radius:50%;font-size:12px;cursor:pointer;flex-shrink:0}
.evemoji-row{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}.evemoji-row button{width:20px;height:20px;border-radius:50%;border:1px solid transparent;background:#fafafa;font-size:10px;cursor:pointer}.evemoji-row button:hover{border-color:#F4ACB7}.evemoji-row button.on{border-color:#E8879B;background:#FFF5F0}
.saverow .save{flex:1;padding:11px;background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;border:none;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer}
.saverow .del{width:38px;height:38px;border:2px solid #eee;border-radius:50%;background:none;cursor:pointer;font-size:13px;color:#ccc}.saverow .del:hover{border-color:#D4687C;color:#D4687C}

/* Lightbox */
.lb{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);z-index:3000;display:flex;align-items:center;justify-content:center;cursor:pointer}
.lb img{max-width:90vw;max-height:90vh;border-radius:8px}

/* Toast */
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#fff;border-radius:18px;padding:8px 18px;font-size:12px;color:#4A3040;box-shadow:0 6px 20px rgba(0,0,0,0.1);z-index:5000}

/* Hearts */
.hearts{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999}
.hearts .hf{position:absolute;animation:fly 2s ease-out forwards}
@keyframes fly{0%{opacity:1;transform:translateY(0) scale(1) rotate(0)}100%{opacity:0;transform:translateY(-180px) scale(0.15) rotate(25deg)}}

/* Leaflet */
.leaflet-control-zoom{display:none}
.cm{background:transparent!important;border:none!important}
.cm .mdot{width:38px;height:38px;background:linear-gradient(135deg,#F4ACB7,#E8879B);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;box-shadow:0 3px 10px rgba(232,135,155,0.35);border:2px solid #fff;transform:translate(-50%,-50%);cursor:pointer}
.cm .mwish{background:linear-gradient(135deg,#FFD1B3,#FFB88C)!important}

px;border-radius:50%;border:none;background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;cursor:pointer;font-size:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center}.sr-add:hover{transform:scale(1.1)}.mktip{background:#fff!important;border:none!important;border-radius:12px!important;padding:6px 10px!important;font-size:11px!important;box-shadow:0 4px 14px rgba(0,0,0,0.12)!important}.mktip::before{border-top-color:#fff!important}

<div class="main">
  <!-- MAP -->
  <div class="page show" id="p_map"><div class="mwrap">
    <div id="map"></div>

    <div class="tools"><button id="routeBtn" onclick="toggleRoute()" title="路线">✈️</button><button onclick="enterAdd()" title="添加">📍</button><button onclick="enterWish()" title="想去">💭</button></div>

  </div>

    <div class="sidelist" id="slist"></div>

  <!-- TIMELINE -->

  <div class="page" id="p_things"><div class="page-inner" id="tg"></div></div>

</div>

<script>
// ==================== CONFIG ====================
var SUPABASE_URL='https://wrnjhdgoriflwchrzfem.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndybmpoZGdvcmlmbHdjaHJ6ZmVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwNTU0NzIsImV4cCI6MjA5NTYzMTQ3Mn0.G542eQ0p_efS49gPc-7ahw5LxaXTXMdqg6h_9DOX8Zk';
var CODE='ourlove2024';
var SK='couple_hub_v3';

// ==================== DATA ====================
var things0='👫一起看日出|🌅一起看日落|🌟一起看星星|🏕️一起去露营|🏖️一起去海边|⛰️一起爬山|🎢一起去游乐园|🎬一起去看电影|🍳一起做一顿饭|🎂一起做蛋糕|📸拍一组情侣照|💌给对方写一封情书|🎁准备惊喜礼物|🌸一起看花海|🍂一起踩落叶|❄️一起看雪|🎆一起看烟花|🎵去音乐会|🏛️去博物馆|📚去图书馆|🚲一起骑车|🛶一起划船|🐱一起撸猫|🐶一起遛狗|🎨一起画画|🧩一起拼拼图|🎮一起打游戏|🏀一起运动|☕去咖啡馆|🍣吃日料|🍲吃火锅|🍦吃冰淇淋|🍓去摘草莓|🛒逛超市|👗一起逛街|💐送花|💇帮对方吹头发|🤗拥抱一分钟|😴睡到自然醒|🍳为对方做早餐|🗺️去陌生城市|🚗自驾游|🏊游泳|🎿滑雪|🐬看海豚|🦒去动物园|🌌一起看极光|🏯去古镇|🌉在桥上散步|🎡坐摩天轮|🗼去看铁塔|🏰去城堡|🌋看火山|🏜️去沙漠|🛳坐邮轮|🎈坐热气球|✈️出国旅行|🏠装饰房间|🌱养植物|📖给对方读书|🎤去KTV|👻去鬼屋|🎃过万圣节|🎄装饰圣诞树|🧧包饺子|🎂庆祝生日|💍挑戒指|📅规划未来|👶想宝宝名字|🏡看房子|💒参加婚礼|🫂陪伴难过的时刻|🤝牵手走过一条街|👀对视三分钟|🗣️说我爱你|💤一起进入梦乡'.split('|');

var locs=[],wish=[],annis=[],things=[],letters=[],bulletins=[],cdPri=null;
var map,ml,wml,rline,showR=false,selId=null,pp=null,am=false,wm=false,sm=null,stid,cur='map',mt='visited';

// ==================== PERSISTENCE ====================
function load(){try{var d=JSON.parse(localStorage.getItem(SK))||{};locs=d.locations||[];wish=d.wishlist||[];annis=d.anniversaries||[];letters=d.letters||[];things=(d.things&&d.things.length>0&&d.things[0].text)?d.things:buildThings();bulletins=d.bulletins||[];cdPri=d.cdPrimary||null;locs.forEach(function(l){if(!l.events)l.events=[];if(!l.memories)l.memories=[]})}catch(e){reset()}}
function buildThings(){return things0.map(function(t,i){return{id:'t'+i,text:t,done:false}})}
function reset(){locs=[];wish=[];annis=[];letters=[];things=buildThings();cdPri=null}
function save(){var d={locations:locs,wishlist:wish,anniversaries:annis,things:things,letters:letters,bulletins:bulletins,cdPrimary:cdPri};localStorage.setItem(SK,JSON.stringify(d));saveCloud(d)}
function uid(){return'x'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function toast(m){var e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(function(){e.remove()},1800)}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}
function esa(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ==================== CLOUD ====================
function saveCloud(d){fetch(SUPABASE_URL+'/rest/v1/couple_data',{method:'POST',headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY,'Content-Type':'application/json',Prefer:'resolution=merge-duplicates'},body:JSON.stringify({couple_code:CODE,data:d,updated_at:new Date().toISOString()})}).catch(function(){})}
function fetchCloud(){fetch(SUPABASE_URL+'/rest/v1/couple_data?couple_code=eq.'+CODE+'&select=data',{headers:{apikey:SUPABASE_KEY,Authorization:'Bearer '+SUPABASE_KEY}}).then(function(r){return r.json()}).then(function(rows){if(rows&&rows.length>0&&rows[0].data){var d=rows[0].data;var cl=d.locations||[];cl.forEach(function(l){if(!l.events)l.events=[];if(!l.memories)l.memories=[]});var cw=d.wishlist||[];var ca=d.anniversaries||[];var ct=(d.things&&d.things.length&&d.things[0].text)?d.things:null;var cle=d.letters||[];var cb=d.bulletins||[];var ids={};locs.forEach(function(l){ids[l.id]=true});cl.forEach(function(l){if(!ids[l.id]){locs.push(l);ids[l.id]=true}});ids={};wish.forEach(function(w){ids[w.id]=true});cw.forEach(function(w){if(!ids[w.id]){wish.push(w);ids[w.id]=true}});ids={};annis.forEach(function(a){ids[a.id]=true});ca.forEach(function(a){if(!ids[a.id]){annis.push(a);ids[a.id]=true}});ids={};letters.forEach(function(l){ids[l.id]=true});cle.forEach(function(l){if(!ids[l.id]){letters.push(l);ids[l.id]=true}});if(ct&&(!things||!things.length||!things[0].text)){things=ct};bulletins=cb.length>bulletins.length?cb:bulletins;cdPri=d.cdPrimary||cdPri;save();setDot('g');refreshAll();renderBulletin()}}).catch(function(){setDot('r')})}

function setDot(c){var d=document.getElementById('cdot');d.className='dot '+c}

// ==================== NAV ====================
function go(p){cur=p;document.querySelectorAll('.page').forEach(function(e){e.classList.remove('show')});document.getElementById('p_'+p).classList.add('show');document.querySelectorAll('.tabs button').forEach(function(b){b.classList.remove('on')});document.querySelector('.tabs button:nth-child('+('map,timeline,things,anni,stats,letters'.split(',').indexOf(p)+1)+')').classList.add('on');if(p==='map'){setTimeout(function(){map&&map.invalidateSize()},200)};if(p==='timeline')renderTL();if(p==='things')renderThings();if(p==='anni')renderAnni();if(p==='stats')renderStats();if(p==='letters')renderLetters()}

function refreshAll(){renderMapMarkers();renderSList();renderTL();renderThings();renderAnni();renderStats();renderLetters()}

// ==================== MAP ====================
function initMap(){
  map=L.map('map',{center:[34.5,108.5],zoom:5,zoomControl:false,attributionControl:false});
  // Use Gaode tiles as primary (works in China), OSM as fallback
  var layer=L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}',{maxZoom:18,subdomains:['1','2','3','4']}).addTo(map);
  layer.on('tileerror',function(){layer.setUrl('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');layer.options.subdomains='abc'});
  ml=L.layerGroup().addTo(map);wml=L.layerGroup().addTo(map);
  map.on('click',function(e){if(am){am=false;uh();showAddModal(e.latlng.lat,e.latlng.lng,'','');rg(e.latlng.lat,e.latlng.lng,function(a){if(a){var n=a.split(',')[0];var inp=document.getElementById('amodName');if(inp)inp.value=n;var ad=document.querySelector('.addbox .addr');if(ad)ad.innerHTML='📍 '+esc(a);window._addAddr=a}else{var ad2=document.querySelector('.addbox .addr');if(ad2)ad2.innerHTML='📍 手动输入地址'}})}else if(wm){wm=false;uh();showAddModal(e.latlng.lat,e.latlng.lng,'','');rg(e.latlng.lat,e.latlng.lng,function(a){if(a){var n=a.split(',')[0];var inp=document.getElementById('amodName');if(inp)inp.value=n;var ad=document.querySelector('.addbox .addr');if(ad)ad.innerHTML='📍 '+esc(a);window._addAddr=a}else{var ad2=document.querySelector('.addbox .addr');if(ad2)ad2.innerHTML='💭 手动输入想去的地方'}})}});
  map.on('movestart',function(){document.getElementById('pin').style.display='none';document.getElementById('plb').style.display='none'});
  setTimeout(function(){map.invalidateSize()},300);
  renderMapMarkers();renderSList();
}
function renderMapMarkers(){ml.clearLayers();wml.clearLayers();locs.forEach(function(l){var i=L.divIcon({className:'cm',html:'<div class="mdot">'+(l.emoji||'📍')+'</div>',iconSize:[38,38],iconAnchor:[19,19]});var m=L.marker([l.lat,l.lng],{icon:i}).addTo(ml);m.bindTooltip('<b>'+esc(l.name)+'</b>'+(l.photos.length?'<br><img src="'+l.photos[0]+'" style="width:80px;height:60px;object-fit:cover;border-radius:6px;margin-top:4px">':''),{className:'mktip',direction:'top',offset:[0,-10]});m.on('click',function(e){L.DomEvent.stopPropagation(e);openDetail(l.id)})});wish.forEach(function(w){var i=L.divIcon({className:'cm',html:'<div class="mdot mwish">💭</div>',iconSize:[38,38],iconAnchor:[19,19]});var m=L.marker([w.lat,w.lng],{icon:i,opacity:0.6}).addTo(wml);m.bindTooltip('<b>'+esc(w.name)+'</b> （想去）',{className:'mktip',direction:'top',offset:[0,-10]});m.on('click',function(e){L.DomEvent.stopPropagation(e);promoteWish(w.id)})})}function updateRoute(){if(rline){map.removeLayer(rline);rline=null}if(!showR||locs.length<2)return;var s=locs.slice().sort(function(a,b){return a.createdAt-b.createdAt});rline=L.polyline(s.map(function(l){return[l.lat,l.lng]}),{color:'#F4ACB7',weight:2.5,opacity:0.5,dashArray:'8 5',lineCap:'round'}).addTo(map)}
function toggleRoute(){showR=!showR;document.getElementById('routeBtn').classList.toggle('ac',showR);updateRoute()}
function uh(){var e=document.getElementById('hint');if(am){e.textContent='📍 现在在地图上点击你要标记的位置！';document.body.style.cursor='crosshair'}else if(wm){e.textContent='💭 在地图上点击你想去的地方';document.body.style.cursor='crosshair'}else{e.textContent='👆 点击这里，然后在地图上点一个位置来标记';document.body.style.cursor=''}}

// ==================== GEOCODING ====================
function sq(q,cb){var x=new XMLHttpRequest();x.timeout=8000;x.open('GET','https://nominatim.openstreetmap.org/search?format=json&limit=5&accept-language=zh&q='+encodeURIComponent(q));x.onload=function(){if(x.status===200)try{cb(JSON.parse(x.responseText))}catch(e){cb([])}else cb([])};x.onerror=function(){cb([])};x.ontimeout=function(){cb([])};x.send()}
function rg(lat,lng,cb){var x=new XMLHttpRequest();x.timeout=8000;x.open('GET','https://nominatim.openstreetmap.org/reverse?format=json&accept-language=zh&lat='+lat+'&lon='+lng);x.onload=function(){if(x.status===200)try{cb(JSON.parse(x.responseText).display_name||'')}catch(e){cb('')}else cb('')};x.onerror=function(){cb('')};x.ontimeout=function(){cb('')};x.send()}

// ==================== SEARCH ====================
function doSearch(){var q=document.getElementById('si').value.trim();if(!q)return;sq(q,function(r){showSR(r)})}
function showSR(r){var c=document.getElementById('sr');if(!r.length){c.innerHTML='<div style="padding:14px;text-align:center;color:#ccc;font-size:11px">没有找到</div>';c.classList.add('open');return}c.innerHTML=r.map(function(r,i){return'<div class="r" style="display:flex;align-items:center;gap:8px"><div style="flex:1;cursor:pointer" onclick="selSR('+i+')"><div style="font-weight:600;font-size:12px">'+esc(r.display_name.split(',')[0])+'</div><div style="font-size:10px;color:#bbb">'+esc(r.display_name)+'</div></div><button class="sr-add" onclick="event.stopPropagation();quickAdd('+i+')" title="直接添加">✓</button></div>'}).join('');c.classList.add('open');c._r=r}

function showPin(lat,lng,addr){var n=addr?addr.split(',')[0]:'这个位置';document.getElementById('pn').textContent=n;document.getElementById('pa').textContent=addr||'';var pin=document.getElementById('pin'),plb=document.getElementById('plb');var pt=map.latLngToContainerPoint([lat,lng]);pin.style.left=pt.x+'px';pin.style.top=pt.y+'px';pin.style.display='block';plb.style.left=pt.x+'px';plb.style.top=pt.y+'px';plb.style.display='block';if(sm)map.removeLayer(sm);var icon=L.divIcon({className:'cm',html:'<div class="mdot">📍</div>',iconSize:[38,38],iconAnchor:[19,19]});sm=L.marker([lat,lng],{icon:icon}).addTo(map);setTimeout(function(){var def=addr?addr.split(',')[0].trim():'';showAddModal(lat,lng,addr,def)},300)}
function showAddModal(lat,lng,addr,name){
  var m=document.getElementById('modal');
  // Build with createElement for reliability
  m.innerHTML='';
  var overlay=document.createElement('div');
  overlay.className='addmod';
  overlay.onclick=function(e){if(e.target===overlay)closeAddMod()};
  var box=document.createElement('div');
  box.className='addbox';
  box.onclick=function(e){e.stopPropagation()};
  var h3=document.createElement('h3');
  h3.textContent='✨ 标记这个地点';
  box.appendChild(h3);
  var adiv=document.createElement('div');
  adiv.className='addr';
  adiv.textContent=addr?'📍 '+addr:'📍 正在获取地址...';
  box.appendChild(adiv);
  var inp=document.createElement('input');
  inp.type='text';inp.id='amodName';inp.value=name||'';
  inp.placeholder='给这个地方起个名字～';
  box.appendChild(inp);
  var drow=document.createElement('div');drow.className='arow';
  drow.innerHTML='📅 ';
  var dinp=document.createElement('input');
  dinp.type='date';dinp.id='amodDate';
  dinp.value=new Date().toISOString().slice(0,10);
  drow.appendChild(dinp);
  box.appendChild(drow);
  var erow=document.createElement('div');erow.className='emos2';erow.id='amodEmos';
  var emos=['📍','🏖️','🏔️','🏯','🌃','🏝️','🎡','🗼','🏛️','🎢','🌅','🏕️','🛳️','✈️','💒','🌸','🌊','⛰️','🏰','🌋','🏜️','🗽','🕌','❄️','🍜','🏘️'];
  var selEmo=pickEmoji(name||'');
  emos.forEach(function(e){
    var b=document.createElement('button');b.textContent=e;
    if(e===selEmo)b.className='on';
    b.onclick=function(){var bb=erow.querySelectorAll('button');bb.forEach(function(x){x.className=''});b.className='on';selEmo=e};
    erow.appendChild(b);
  });
  box.appendChild(erow);
  var btns=document.createElement('div');btns.className='btns';
  var cancelBtn=document.createElement('button');
  cancelBtn.className='cancel';cancelBtn.textContent='取消';
  cancelBtn.onclick=closeAddMod;
  var saveBtn=document.createElement('button');
  saveBtn.className='ok';saveBtn.textContent='💾 保存';
  saveBtn.onclick=doAddMod;
  btns.appendChild(cancelBtn);btns.appendChild(saveBtn);
  box.appendChild(btns);
  overlay.appendChild(box);
  m.appendChild(overlay);
  window._addLat=lat;window._addLng=lng;window._addAddr=addr;window._addEmo=selEmo;
}
function closeAddMod(){document.getElementById('modal').innerHTML='';document.getElementById('pin').style.display='none';document.getElementById('plb').style.display='none';if(sm){map.removeLayer(sm);sm=null}}
function doAddMod(){var name=document.getElementById('amodName').value.trim();if(!name){toast('⚠️ 请给地点起个名字');return}if(window._addLat===undefined||window._addLng===undefined||isNaN(window._addLat)){toast('⚠️ 位置信息丢失，请重新选择');closeAddMod();return}var date=document.getElementById('amodDate').value;var addr=window._addAddr||'';var lat=window._addLat,lng=window._addLng;var emo=window._addEmo||'📍';closeAddMod();if(wm)createWish(lat,lng,name,addr);else createLocFull(lat,lng,name,addr,date,emo)}

function renderSList(){var l=document.getElementById('slist');document.querySelectorAll('.sidehead .t2 button').forEach(function(b,i){b.classList.toggle('on',(i===0&&mt==='visited')||(i===1&&mt==='wishlist'))});if(mt==='visited'){if(!locs.length){l.innerHTML='<div class="empty"><div class="ei">🗺️</div><p>还没有一起走过的地方</p></div>';return}l.innerHTML=locs.slice().sort(function(a,b){return b.createdAt-a.createdAt}).map(function(loc){var hasImg=loc.photos.length>0;var th=hasImg?'<div style="width:48px;height:48px;border-radius:8px;overflow:hidden;flex-shrink:0"><img src="'+loc.photos[0]+'" style="width:100%;height:100%;object-fit:cover"></div>':'<div style="width:48px;height:48px;border-radius:8px;background:linear-gradient(135deg,#FFF0F3,#FFE0E7);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">'+(loc.emoji||'📍')+'</div>';var preview=loc.notes?'<div style="font-size:10px;color:#bbb;margin-top:3px;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden">💭 '+esc(loc.notes)+'</div>':'';var tags='';if(loc.photos.length)tags+='<span style="font-size:9px;background:rgba(244,172,183,0.08);color:#E8879B;padding:2px 6px;border-radius:8px;margin-right:4px">📷'+loc.photos.length+'</span>';if(loc.memories.length)tags+='<span style="font-size:9px;background:rgba(244,172,183,0.08);color:#E8879B;padding:2px 6px;border-radius:8px">💬'+loc.memories.length+'</span>';return'<div class="scard'+(loc.id===selId?' on':'')+'" onclick="openDetail(\''+loc.id+'\')" style="display:flex;align-items:center;gap:10px">'+th+'<div style="flex:1;min-width:0"><div class="sn">'+esc(loc.name)+'</div>'+(loc.address?'<div class="sa">'+esc(loc.address)+'</div>':'')+preview+'<div style="display:flex;align-items:center;gap:6px;margin-top:3px"><div class="sd">'+loc.date+'</div>'+tags+'</div></div></div>'}).join('')}else{if(!wish.length){l.innerHTML='<div class="empty"><div class="ei">💭</div><p>想去的地方会在这里</p></div>';return}l.innerHTML=wish.map(function(w){return'<div class="scard" onclick="map.flyTo(['+w.lat+','+w.lng+'],12,{duration:0.5})" style="display:flex;align-items:center;gap:8px"><span style="font-size:16px;flex-shrink:0">💭</span><div style="flex:1;min-width:0"><div class="sn">'+esc(w.name)+'</div>'+(w.address?'<div class="sa">'+esc(w.address)+'</div>':'')+'</div><span onclick="event.stopPropagation();promoteWish(\''+w.id+'\')" style="cursor:pointer;font-size:13px" title="标记为已去">✅</span></div>'}).join('')}}

function openDetail(id){selId=id;var loc=findLoc(id);if(!loc)return;renderDetail(loc);renderSList();map.flyTo([loc.lat,loc.lng],13,{duration:0.6})}
function closeDetail(){selId=null;document.getElementById('dlg').innerHTML='';renderSList()}
function findLoc(id){return locs.find(function(l){return l.id===id})}
function renderDetail(loc){var ph='';loc.photos.forEach(function(p,i){ph+='<div class="pc"><img src="'+p+'" onclick="openLB(\''+p+'\')"><button class="pr" onclick="event.stopPropagation();rmPhoto(\''+loc.id+'\','+i+')">✕</button></div>'});ph+='<div class="add" onclick="askPhoto(\''+loc.id+'\')">📷<span>添加</span></div>';var mh='';loc.memories.forEach(function(m,i){mh+='<div class="mi"><span class="md"></span><span class="mx">'+esc(m.text)+'</span><button class="mr" onclick="rmMemory(\''+loc.id+'\','+i+')">✕</button></div>'});var emos='📍,🏖️,🏔️,🏯,🌃,🏝️,🎡,🗼,🏛️,🎢,🌅,🏕️,🛳️,✈️,💒,🌸,🌊,⛰️,🏰,🌋,🏜️,🗽,🕌,❄️,🍜,🏘️'.split(',');var ec='';emos.forEach(function(e){ec+='<button class="emos-btn'+(loc.emoji===e?' on':'')+'" onclick="setEmoji(\''+loc.id+'\',\''+e+'\')">'+e+'</button>'});document.getElementById('dlg').innerHTML='<div class="dovl" onclick="if(event.target===this)saveClose(\''+loc.id+'\')"><div class="dpanel" onclick="event.stopPropagation()"><div class="dtop"><button onclick="saveClose(\''+loc.id+'\')">✕</button></div><div class="din"><div class="dhero"><div class="di">'+(loc.emoji||'📍')+'</div><input value="'+esa(loc.name)+'" onchange="updateName(\''+loc.id+'\',this.value)">'+(loc.address?'<div class="da">📍 '+esc(loc.address)+'</div>':'')+'<div style="margin-top:4px">📅 <input type="date" value="'+loc.date+'" onchange="updateDate(\''+loc.id+'\',this.value)" style="border:none;background:none;font-size:11px;font-family:inherit;color:#bbb" id="dt_'+loc.id+'"></div></div><div class="sec"><h4>📸 照片回忆</h4><div class="pgrid">'+ph+'</div></div><div class="sec"><h4>💭 旅行感悟</h4><textarea class="ta" placeholder="写下在这里的感受..." onchange="updateNotes(\''+loc.id+'\',this.value)">'+esc(loc.notes||'')+'</textarea></div><div class="sec"><h4>🎯 重大事件</h4>'+renderEvents(loc)+'</div><div class="sec"><h4>✨ 小事情·小甜蜜</h4><div class="mems">'+(mh||'<div style="font-size:10px;color:#ddd;padding:4px 0">还没有记录～</div>')+'</div><div class="mar"><input id="memInp_'+loc.id+'" placeholder="记下可爱的瞬间..." onkeydown="if(event.key===\'Enter\')addMem(\''+loc.id+'\')"><button onclick="addMem(\''+loc.id+'\')">+</button></div></div><div class="emos">'+ec+'</div><div class="saverow"><button class="save" onclick="saveClose(\''+loc.id+'\')">💾 保存</button><button class="del" onclick="deleteLoc(\''+loc.id+'\')">🗑</button></div></div></div></div>'}

function updateName(id,v){var l=findLoc(id);if(l)l.name=v}function updateDate(id,v){var l=findLoc(id);if(l)l.date=v}function updateNotes(id,v){var l=findLoc(id);if(l)l.notes=v}

function askPhoto(id){pp=id;document.getElementById('pi').click()}
function handlePhoto(f){var file=f.target.files[0];if(!file||!pp)return;var r=new FileReader();r.onload=function(e){shrink(e.target.result,800,function(d){var l=findLoc(pp);if(l){l.photos.push(d);save();renderDetail(l);renderSList()}pp=null})};r.readAsDataURL(file);f.target.value=''}
function shrink(u,w,cb){var i=new Image();i.onload=function(){if(i.width<=w){cb(u);return}var c=document.createElement('canvas');var r=w/i.width;c.width=w;c.height=i.height*r;c.getContext('2d').drawImage(i,0,0,c.width,c.height);cb(c.toDataURL('image/jpeg',0.8))};i.src=u}

function renderEvents(loc){var Q='\x27';var eh='';if(loc.events&&loc.events.length){loc.events.forEach(function(ev,i){eh+='<div class=\"evcard\"><button class=\"evdel\" onclick=\"deleteEvent('+Q+loc.id+Q+','+i+')\">✕</button><div class=\"evtop\"><span class=\"evemoji\">'+(ev.emoji||'🎯')+'</span><span class=\"evtitle\">'+esc(ev.title)+'</span><span class=\"evdate\">'+ev.date+'</span></div>'+(ev.note?'<div class=\"evnote\">'+esc(ev.note)+'</div>':'')+'</div>'})}else{eh='<div style=\"font-size:10px;color:#ddd;padding:4px 0\">还没有记录重大事件～</div>'};eh+='<div class=\"evadd\"><input id=\"evTitle_'+loc.id+'\" placeholder=\"事件名称，如：求婚💍\" onkeydown=\"if(event.key===&quot;Enter&quot;)addEvent('+Q+loc.id+Q+')\"><input class=\"evd\" type=\"date\" id=\"evDate_'+loc.id+'\" value=\"'+new Date().toISOString().slice(0,10)+'\"><button onclick=\"addEvent('+Q+loc.id+Q+')\" title=\"添加\">+</button></div><div class=\"evemoji-row\" id=\"evEmoR_'+loc.id+'\"></div>';setTimeout(function(){var erow=document.getElementById('evEmoR_'+loc.id);if(!erow)return;var eevos='🎯,💍,💒,🎂,🏠,👶,🎓,💼,🚗,✈️,🏆,🎉,🌹,💝,💌,📜,🗝️,🌟'.split(',');var sel='🎯';eevos.forEach(function(e){var b=document.createElement('button');b.textContent=e;b.onclick=function(){erow.querySelectorAll('button').forEach(function(bb){bb.classList.remove('on')});b.classList.add('on');sel=e;window['_evEmo_'+loc.id]=e};if(e===sel)b.classList.add('on');erow.appendChild(b)});window['_evEmo_'+loc.id]=sel},50);return eh}

ius:14px;overflow:hidden;margin-bottom:6px;box-shadow:0 4px 16px rgba(0,0,0,0.08)"><img src="'+item.data.photos[0]+'" style="width:100%;max-height:180px;object-fit:cover;display:block"></div>':'')+'<div style="background:#fff;border-radius:12px;padding:14px 16px;box-shadow:0 1px 4px rgba(0,0,0,0.04);border:1px solid #f5f5f5;margin-top:2px"><div style="font-size:9px;color:#E8879B;font-weight:600;letter-spacing:1px;margin-bottom:3px">📍 旅行</div><div style="font-size:14px;font-weight:700;margin-bottom:2px">'+esc(item.name)+'</div><div style="font-size:10px;color:#bbb;margin-bottom:4px">📅 '+item.date+'</div>'+(hasPhoto?'<div style="font-size:10px;color:#aaa;margin-bottom:2px">📷 '+item.data.photos.length+' 张照片</div>':'')+(item.data.notes?'<div style="font-size:11px;color:#888;line-height:1.5;margin-top:4px;padding-top:6px;border-top:1px solid #f5f5f5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden">'+esc(item.data.notes)+'</div>':'')+(item.data.memories&&item.data.memories.length>0?'<div style="margin-top:6px;padding-top:6px;border-top:1px solid #f5f5f5">'+item.data.memories.map(function(m){return'<div style="display:flex;align-items:flex-start;gap:4px;font-size:10px;color:#bbb;line-height:1.4;padding:2px 0"><span style="width:4px;height:4px;background:#F4ACB7;border-radius:50%;flex-shrink:0;margin-top:4px"></span><span>'+esc(m.text)+'</span></div>'}).join('')+'</div>':'')+'<div style="font-size:9px;color:#ddd;text-align:right;margin-top:6px">点击查看详情 →</div></div></div></div>'});h+='</div>';c.innerHTML=h}

// ==================== 100 THINGS ====================
function renderThings(){var c=document.getElementById('tg');if(!things||!things.length)things=buildThings();var dc=things.filter(function(t){return t&&t.done}).length;var pct=things.length>0?Math.round(dc/things.length*100):0;var h='<div class="hd"><h2>✅ 一起完成的小事</h2><div class="barwrap"><div class="bar"><div class="fill" style="width:'+pct+'%"></div></div><span class="pct">'+pct+'%</span></div></div><div style="max-width:500px;margin:0 auto 12px;display:flex;gap:8px"><input id="thingInp" placeholder="添加一件想一起做的事..." style="flex:1;padding:9px 14px;border:2px solid #f0f0f0;border-radius:20px;font-size:12px;font-family:inherit;outline:none;color:#4A3040" onkeydown="if(event.key===\'Enter\')addThing()"><button onclick="addThing()" style="width:38px;height:38px;background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;border:none;border-radius:50%;font-size:18px;cursor:pointer;flex-shrink:0">+</button></div><div class="thingsgrid">';things.forEach(function(t){h+='<div class="tcard'+(t.done?' done':'')+'" onclick="toggleThing(\''+t.id+'\')"><div class="chk">'+(t.done?'✓':'')+'</div><span style="flex:1">'+esc(t.text||'')+'</span><span class="tnote'+(t.note?' has':'')+'" onclick="event.stopPropagation();editThingNote(\''+t.id+'\')" title="'+(t.note?esc(t.note):'加备注')+'">'+(t.note?'📝':'➕')+'</span><button class="tcard-del" onclick="event.stopPropagation();deleteThing(\''+t.id+'\')" title="删除">✕</button></div>'});h+='</div>';c.innerHTML=h}
function toggleThing(id){var t=things.find(function(t){return t.id===id});if(!t)return;t.done=!t.done;save();renderThings();if(t.done)spawnHearts(6)}
function addThing(){var inp=document.getElementById('thingInp');if(!inp)return;var v=inp.value.trim();if(!v)return;things.push({id:uid(),text:v,done:false,note:''});inp.value='';save();renderThings();toast('✅ 已添加！')}
function editThingNote(id){var t=things.find(function(t){return t.id===id});if(!t)return;var nn=prompt('💭 备注：',t.note||'');if(nn!==null){t.note=nn.trim();save();renderThings()}}
function deleteThing(id){things=things.filter(function(t){return t.id!==id});save();renderThings()}

// ==================== ANNIVERSARIES ====================
function renderAnni(){var c=document.getElementById('ag');var h='<div class="hd"><h2>💝 纪念日</h2><p>每一个重要的日子，都值得被记住</p></div><div class="annigrid">';var grads=[['#FFF5F7','#FFE8EC'],['#FFF0F5','#FFE0E8'],['#FFF5F0','#FFE5D9'],['#FFF8F5','#FFE8E0']];annis.forEach(function(a,i){var d=cd(a.date);var grad=grads[i%4];var upcoming=(d>=0&&d<=30);var t=d>=0?(d===0?'🎉 就是今天！':(d<=7?'🔥 还有 '+d+' 天':(d<=30?'即将：'+d+' 天后':'还有 '+d+' 天'))):'已过 '+Math.abs(d)+' 天';h+='<div class="acard" style="background:linear-gradient(135deg,'+grad[0]+','+grad[1]+');border-color:'+(upcoming?'rgba(232,135,155,0.3)':'rgba(0,0,0,0.04)')+'" onclick="openAnniModal(\''+a.id+'\')"><button class="arm" onclick="event.stopPropagation();deleteAnni(\''+a.id+'\')">✕</button><div class="ai" style="font-size:40px">'+(a.emoji||'💝')+'</div><div class="an" style="font-size:15px">'+esc(a.name)+'</div><div class="ad">'+a.date+'</div><div class="ac" style="'+(upcoming?'background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;font-weight:700;box-shadow:0 2px 10px rgba(232,135,155,0.2);animation:pulse 2s ease-in-out infinite':'')+'">'+t+'</div></div>'});h+='<div class="aadd" onclick="openAnniModal()">➕ 添加纪念日</div></div>';c.innerHTML=h}
function cd(d){var t=new Date(d);t.setHours(0,0,0,0);var n=new Date();n.setHours(0,0,0,0);return Math.ceil((t-n)/86400000)}
function openAnniModal(id){var a=id?annis.find(function(a){return a.id===id}):null;document.getElementById('modal').innerHTML='<div class="ovl" onclick="if(event.target===this)closeModal()"><div class="mdl" onclick="event.stopPropagation()"><h4>'+(a?'编辑纪念日':'💝 添加纪念日')+'</h4><input id="amName" placeholder="名称" value="'+(a?esa(a.name):'')+'"><input id="amDate" type="date" value="'+(a?a.date:'')+'"><input id="amEmoji" placeholder="图标" value="'+(a?(a.emoji||'💝'):'💝')+'" maxlength="4" style="width:80px"><div class="mr"><button class="no" onclick="closeModal()">取消</button><button class="ok" onclick="saveAnni(\''+(a?a.id:'')+'\')">保存</button></div></div></div>'}
function saveAnni(id){var n=document.getElementById('amName').value.trim();var d=document.getElementById('amDate').value;var e=document.getElementById('amEmoji').value.trim()||'💝';if(!n||!d)return;if(id){var a=annis.find(function(a){return a.id===id});if(a){a.name=n;a.date=d;a.emoji=e}}else{annis.push({id:uid(),name:n,date:d,emoji:e})}annis.sort(function(a,b){return new Date(a.date)-new Date(b.date)});if(!cdPri&&annis.length>0)cdPri=annis[0].id;save();closeModal();renderAnni()}
function deleteAnni(id){if(!confirm('确定删除吗？'))return;annis=annis.filter(function(a){return a.id!==id});if(cdPri===id)cdPri=annis.length>0?annis[0].id:null;save();renderAnni()}
function closeModal(){document.getElementById('modal').innerHTML=''}

// ==================== STATS ====================
function renderStats(){var c=document.getElementById('sg');var tp=locs.reduce(function(s,l){return s+l.photos.length},0);var tm=locs.reduce(function(s,l){return s+l.memories.length},0);var dc=things.filter(function(t){return t.done}).length;var td=0;if(annis.length>0){var f=new Date(annis[0].date);f.setHours(0,0,0,0);var n=new Date();n.setHours(0,0,0,0);td=Math.max(0,Math.floor((n-f)/86400000))}var y=Math.floor(td/365),m=Math.floor((td%365)/30),w=Math.floor(td/7);var h='<div class="hd"><h2>📊 恋爱统计</h2></div><div class="banner"><div class="bg">💕</div><div style="font-size:10px;color:#bbb;margin-bottom:4px">在一起的时光</div><div class="bn">'+td+'</div><div style="font-size:11px;color:#bbb">天</div><div class="cols"><div><b>'+y+'</b>年</div><div><b>'+m+'</b>个月</div><div><b>'+w+'</b>周</div><div><b>'+td+'</b>天</div></div></div><div class="statsgrid"><div class="statsc"><div class="si">🗺️</div><div class="sn">'+locs.length+'</div><div class="sl">点亮的地方</div></div><div class="statsc"><div class="si">📸</div><div class="sn">'+tp+'</div><div class="sl">照片</div></div><div class="statsc"><div class="si">💬</div><div class="sn">'+tm+'</div><div class="sl">甜蜜回忆</div></div><div class="statsc"><div class="si">✅</div><div class="sn">'+dc+'/'+things.length+'</div><div class="sl">完成的小事</div></div><div class="statsc"><div class="si">💝</div><div class="sn">'+annis.length+'</div><div class="sl">纪念日</div></div><div class="statsc"><div class="si">💌</div><div class="sn">'+letters.length+'</div><div class="sl">信件</div></div></div>';if(locs.length>0){h+='<div style="background:#fff;border:1px solid #f0f0f0;border-radius:12px;padding:14px;margin-bottom:10px"><h4 style="font-size:11px;color:#E8879B;margin-bottom:8px">🏙️ 一起去过的地方</h4><div class="tags">';locs.forEach(function(loc){h+='<span onclick="go(\'map\');setTimeout(function(){openDetail(\''+loc.id+'\')},200)">'+(loc.emoji||'📍')+' '+esc(loc.name)+'</span>'});h+='</div></div>'}h+='<div style="text-align:center;padding:10px 0 20px"><button onclick="exportData()" style="padding:8px 20px;background:#fff;border:1px solid #eee;border-radius:18px;font-size:11px;color:#999;cursor:pointer;font-family:inherit">📦 导出数据</button></div>';c.innerHTML=h}
function exportData(){var eo={locations:locs,wishlist:wish,anniversaries:annis,things:things,letters:letters,exportDate:new Date().toISOString()};var blob=new Blob([JSON.stringify(eo,null,2)],{type:'application/json'});var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='couple-hub-'+new Date().toISOString().slice(0,10)+'.json';a.click();toast('📦 已导出！')}

// ==================== LETTERS ====================
function renderLetters(){var c=document.getElementById('lg');var h='<div class="hd"><h2>💌 我们的悄悄话</h2></div><div style="max-width:580px;margin:0 auto"><div style="background:#fff;border:1px solid #f0f0f0;border-radius:12px;padding:16px;margin-bottom:12px"><input id="lt" placeholder="信件标题..." style="width:100%;padding:8px 12px;border:2px solid #f0f0f0;border-radius:10px;font-size:12px;font-family:inherit;outline:none;margin-bottom:8px;color:#4A3040" maxlength="100"><textarea id="lb" placeholder="写下想说的话... 💌" style="width:100%;min-height:90px;padding:10px 12px;border:2px solid #f0f0f0;border-radius:10px;font-size:12px;font-family:inherit;outline:none;resize:vertical;line-height:1.6;color:#4A3040"></textarea><div style="text-align:right;margin-top:8px"><button onclick="addLetter()" style="padding:8px 20px;background:linear-gradient(135deg,#F4ACB7,#E8879B);color:#fff;border:none;border-radius:16px;font-size:12px;font-weight:600;cursor:pointer">💌 存入信箱</button></div></div>';if(!letters.length){h+='<div style="text-align:center;padding:30px;color:#ccc"><div style="font-size:32px;margin-bottom:6px">📮</div><p style="font-size:11px">信箱是空的</p></div>'}else{letters.slice().reverse().forEach(function(l){h+='<div class="lcard"><button class="lrm" onclick="deleteLetter(\''+l.id+'\')">✕</button><h4>💌 '+esc(l.title||'悄悄话')+'</h4><p>'+esc(l.body)+'</p><div class="ld">'+l.date+'</div></div>'})}h+='</div>';c.innerHTML=h}
function addLetter(){var t=document.getElementById('lt').value.trim();var b=document.getElementById('lb').value.trim();if(!b)return;letters.push({id:uid(),title:t||'悄悄话',body:b,date:new Date().toISOString().slice(0,10),createdAt:Date.now()});save();renderLetters();toast('💌 已存入！')}
function deleteLetter(id){letters=letters.filter(function(l){return l.id!==id});save();renderLetters()}

// ==================== BULLETIN ====================
function renderBulletin(){
  var container=document.getElementById('btop');
  if(!container)return;
  var active=bulletins.filter(function(b){return b.active});
  if(!active.length){container.innerHTML=(bulletins.length?'<button class="bulletin-btn has-bull" onclick="openBulletinModal()" title="有未读公告">📢</button>':'<button class="bulletin-btn" onclick="openBulletinModal()" title="发布公告">📢</button>');return}
  var b=active[0];
  container.innerHTML='<div class="bulletin-bar"><div class="bb-icon">📢</div><div class="bb-info"><div class="bb-title">'+esc(b.title||'小公告')+'</div><div class="bb-body">'+esc(b.body)+'</div><div class="bb-date">'+b.date+'</div></div><button class="bb-close" onclick="dismissBulletin(\''+b.id+'\')" title="已读并关闭">✕</button></div><button class="bulletin-btn has-bull" onclick="openBulletinModal()" title="管理公告">📢</button>';
}
function dismissBulletin(id){
  var b=bulletins.find(function(b){return b.id===id});if(!b)return;
  b.active=false;save();renderBulletin();
}
function openBulletinModal(){
  var actives=bulletins.filter(function(b){return b.active});
  var inactive=bulletins.filter(function(b){return !b.active});
  var h='<div class="ovl" onclick="if(event.target===this)closeModal()"><div class="mdl" onclick="event.stopPropagation()" style="width:420px">'+
    '<h4>📢 公告板</h4>';
  if(actives.length){
    h+='<div style="text-align:left;margin-bottom:10px;font-size:11px;color:#E8879B;font-weight:600">📌 当前公告</div>';
    actives.forEach(function(b){
      h+='<div style="background:#FFF5F0;border-radius:10px;padding:10px 14px;margin-bottom:8px;text-align:left;position:relative">'+
        '<div style="font-size:12px;font-weight:700;padding-right:24px">📢 '+esc(b.title||'')+'</div><div style="font-size:11px;color:#999;margin-top:3px;line-height:1.5">'+esc(b.body)+'</div>'+
        '<div style="font-size:9px;color:#ccc;margin-top:4px">'+b.date+'</div>'+
        '<button onclick="dismissBulletin(\''+b.id+'\');closeModal()" style="position:absolute;top:8px;right:10px;width:22px;height:22px;border:none;background:rgba(244,172,183,0.1);border-radius:50%;cursor:pointer;font-size:10px;color:#E8879B">✕</button>'+
        '</div>';
    });
  }
  // New bulletin form
  h+='<input id="bulTitle" placeholder="公告标题，如：我在想你 ❤️" style="margin-top:8px" value="">'+
    '<input id="bulBody" placeholder="正文..." value="">'+
    '<input id="bulDate" type="date" value="'+new Date().toISOString().slice(0,10)+'" style="margin-bottom:10px">'+
    '<div class="mr"><button class="ok" onclick="postBulletin()">📢 发布公告</button></div>';
  // History
  if(inactive.length){
    h+='<div style="text-align:left;margin-top:16px;font-size:11px;color:#999;font-weight:600">📋 历史公告</div><div class="bul-history" style="margin-top:6px">';
    inactive.slice(0,10).forEach(function(b){
      h+='<div class="bul-h-item"><div class="bh-icon">📢</div><div class="bh-info"><div class="bh-title">'+esc(b.title||'')+'</div><div class="bh-body">'+esc(b.body)+'</div></div><div class="bh-date">'+b.date+'</div><button class="bh-del" onclick="deleteBulletin(\''+b.id+'\')" title="永久删除">✕</button></div>';
    });
    h+='</div>';
  }
  h+='</div></div>';
  document.getElementById('modal').innerHTML=h;
}
function postBulletin(){
  var t=document.getElementById('bulTitle').value.trim();if(!t)t='小公告';
  var b=document.getElementById('bulBody').value.trim();if(!b)return;
  var d=document.getElementById('bulDate').value;
  // Deactivate all others
  bulletins.forEach(function(bu){bu.active=false});
  bulletins.push({id:uid(),title:t,body:b,date:d||new Date().toISOString().slice(0,10),active:true,createdAt:Date.now()});
  save();closeModal();renderBulletin();toast('📢 公告已发布！');
}
function deleteBulletin(id){bulletins=bulletins.filter(function(b){return b.id!==id});save();openBulletinModal()}

// ==================== HEARTS ====================
function spawnHearts(n){var c=document.getElementById('hearts');var e=['💕','💖','💗','💝','✨','🌸','💐','💓','🌟'];var f=document.createDocumentFragment();for(var i=0;i<n;i++){var el=document.createElement('span');el.className='hf';el.textContent=e[Math.floor(Math.random()*e.length)];el.style.left=(10+Math.random()*80)+'%';el.style.top=(50+Math.random()*40)+'%';el.style.animationDuration=(1.2+Math.random()*1.5)+'s';el.style.animationDelay=Math.random()*0.5+'s';el.style.fontSize=(12+Math.random()*18)+'px';f.appendChild(el)}c.appendChild(f);setTimeout(function(){c.innerHTML=''},2400)}

// ==================== EVENTS ====================
document.getElementById('si').addEventListener('input',function(){var v=this.value.trim();if(!v||v.length<2){document.getElementById('sr').classList.remove('open');return}clearTimeout(stid);stid=setTimeout(function(){sq(v,function(r){showSR(r)})},300)});
document.getElementById('si').addEventListener('keydown',function(e){if(e.key==='Enter')doSearch()});
document.addEventListener('click',function(e){var s=document.querySelector('.search');if(s&&!s.contains(e.target))document.getElementById('sr').classList.remove('open')});
document.getElementById('pi').addEventListener('change',handlePhoto);
document.addEventListener('keydown',function(e){if(e.key==='Escape'){if(document.getElementById('lb').innerHTML)document.getElementById('lb').innerHTML='';else if(selId)saveClose(selId);am=false;wm=false;uh()}});

load();
initMap();
renderBulletin();
setDot('y');
fetchCloud();
